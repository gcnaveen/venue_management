  # -------- Leads --------
  /api/venues/{venueId}/leads:
    parameters:
      - $ref: "#/components/parameters/VenueId"
    post:
      tags: [Leads]
      summary: Create lead
      description: |
        Create a new event lead / enquiry for the venue. The `createdBy` field is auto-set to the authenticated user.
        If `eventType` is `other`, provide `eventTypeOther` with the custom event name.
      operationId: postLead
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadCreateRequest"
            examples:
              wedding:
                summary: Wedding lead
                value:
                  eventType: wedding
                  specialDay:
                    startAt: "2026-03-20T10:30:00.000Z"
                    endAt: "2026-03-20T22:30:00.000Z"
                    durationHours: 12
                  expectedGuests: 250
                  contact:
                    name: Rahul Sharma
                    phone: "+919876543210"
              other:
                summary: Custom event type
                value:
                  eventType: other
                  eventTypeOther: Baby shower
                  specialDay:
                    startAt: "2026-03-20T10:30:00.000Z"
                    endAt: "2026-03-20T22:30:00.000Z"
                    durationHours: 12
                  expectedGuests: 250
                  contact:
                    name: Rahul Sharma
                    phone: "+919876543210"
                    altPhone: "+919812345678"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    get:
      tags: [Leads]
      summary: List leads
      description: |
        List all leads for the venue. Optionally filter by `status` query param.
        Response includes populated `createdByUser` and `venue` objects.
      operationId: getLeads
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          description: "Filter by lead status"
          schema:
            type: string
            enum: [new, contacted, followup, visited, negotiation, won, lost]
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Lead"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"


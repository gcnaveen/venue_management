  # -------- Uploads --------
  /api/uploads/presign:
    post:
      tags: [Uploads]
      summary: Get presigned PUT URL
      description: |
        Returns a presigned S3 PUT URL so the client can upload an image directly to S3 (bucket: **venuemanagementdhruva**).

        **Flow:**
        1. Call this endpoint with `fileName`, `contentType`, and optionally `entityId`.
        2. Use the returned `uploadUrl` to `PUT` the raw file binary (set `Content-Type` header to match `contentType`).
        3. Save the returned `key` or `publicUrl` against your venue / space in MongoDB.

        Only `image/*` content types are accepted.
      operationId: postPresign
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresignRequest"
            example:
              fileName: venue-logo.jpg
              contentType: image/jpeg
              entityId: "507f1f77bcf86cd799439011"
              expiresIn: 900
      responses:
        "200":
          description: Presigned URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresignResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/uploads:
    delete:
      tags: [Uploads]
      summary: Delete uploaded file
      description: |
        Deletes an object from S3 by its key.
        Only keys under the `uploads/` prefix are allowed — arbitrary bucket keys are rejected with 400.
      operationId: deleteUpload
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteUploadRequest"
            example:
              key: uploads/images/507f1f77bcf86cd799439011/uuid-venue-logo.jpg
      responses:
        "200":
          description: File deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # -------- Calendar --------
  /api/calendar-days:
    get:
      tags: [Calendar]
      summary: List calendar days
      description: |
        Returns all religious calendar days. Global resource (not venue-scoped).
        Optional filters via query params: `religion`, `type`, `year`, `month`.
      operationId: getCalendarDays
      parameters:
        - in: query
          name: religion
          schema:
            type: string
            enum: [hindu, muslim, christian]
        - in: query
          name: type
          schema:
            type: string
            enum: [most_auspicious, auspicious, less_auspicious]
        - in: query
          name: year
          schema:
            type: integer
          description: Filter by year (e.g. 2026)
        - in: query
          name: month
          schema:
            type: integer
            minimum: 1
            maximum: 12
          description: Filter by month (1–12, January = 1)
      responses:
        "200":
          description: List of calendar days
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CalendarDay"
              example:
                success: true
                data:
                  - _id: "64a1b2c3d4e5f6789012345a"
                    religion: hindu
                    type: most_auspicious
                    date: "2026-01-09"
                    createdBy: "69afbd219ab76559ecbb2f1a"
                    createdByUser:
                      _id: "69afbd219ab76559ecbb2f1a"
                      name: Admin
                      email: admin@example.com
                      role: admin
                    createdAt: "2026-03-13T07:30:00.000Z"
                    updatedAt: "2026-03-13T07:30:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Calendar]
      summary: Create single calendar day
      description: |
        Create one religious calendar day. Requires Admin role.
        Unique constraint: one entry per religion + date.
      operationId: postCalendarDay
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarDayCreateRequest"
            example:
              religion: hindu
              type: most_auspicious
              date: "2026-01-09"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    $ref: "#/components/schemas/CalendarDay"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/calendar-days/bulk:
    post:
      tags: [Calendar]
      summary: Bulk create calendar days
      description: |
        Create multiple religious calendar days in one request. Requires Admin role.
        Duplicates (same religion + date) are skipped and reported.
        Max 500 items per request.
      operationId: postBulkCalendarDays
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarDayBulkRequest"
            example:
              items:
                - religion: hindu
                  type: most_auspicious
                  date: "2026-01-09"
                - religion: hindu
                  type: most_auspicious
                  date: "2026-01-10"
                - religion: hindu
                  type: auspicious
                  date: "2026-02-01"
      responses:
        "201":
          description: Created (at least one item was new)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      created:
                        type: array
                        items:
                          $ref: "#/components/schemas/CalendarDay"
                      skipped:
                        type: array
                        items:
                          type: object
                          properties:
                            religion: { type: string }
                            date: { type: string }
                            reason: { type: string }
                      errors:
                        type: array
                        items:
                          type: object
                          properties:
                            index: { type: integer }
                            message: { type: string }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/calendar-days/{id}:
    patch:
      tags: [Calendar]
      summary: Update calendar day
      description: |
        Update religion, type, or date of a calendar day. Requires Admin role.
      operationId: patchCalendarDay
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
          description: CalendarDay _id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarDayUpdateRequest"
            example:
              type: less_auspicious
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    $ref: "#/components/schemas/CalendarDay"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Calendar]
      summary: Delete calendar day
      description: |
        Permanently delete a calendar day. Requires Admin role.
      operationId: deleteCalendarDay
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
          description: CalendarDay _id
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      deleted: { type: boolean, example: true }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # -------- Health --------
  /test:
    get:
      tags: [Health]
      summary: Health / Smoke
      description: Service connectivity check. No auth.
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT from login or register response

  parameters:
    UserId:
      name: userId
      in: path
      required: true
      description: User ObjectId
      schema:
        type: string
        example: "507f1f77bcf86cd799439011"
    VenueId:
      name: venueId
      in: path
      required: true
      description: Venue ObjectId
      schema:
        type: string
        example: "507f1f77bcf86cd799439011"
    SpaceId:
      name: spaceId
      in: path
      required: true
      description: Space ObjectId
      schema:
        type: string
        example: "507f1f77bcf86cd799439012"
  schemas:
    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
          example: incharge@venue.com
        password:
          type: string
          format: password
          minLength: 8
          example: "SecureP@ss1"
        name:
          type: string
          minLength: 1
          example: Venue Manager
        venueId:
          type: string
          nullable: true
          description: Optional venue to assign to incharge

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@venue.com
        password:
          type: string
          format: password
          example: "SecureP@ss1"

    AuthSuccessResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            user:
              type: object
              properties:
                _id: { type: string }
                email: { type: string }
                name: { type: string }
                role: { type: string }
                venueId: { type: string, nullable: true }
            token:
              type: string
              description: JWT for Authorization header

    CreateUserRequest:
      type: object
      required: [email, password, name, role]
      description: Admin creates a user (if not already registered).
      properties:
        email:
          type: string
          format: email
          example: incharge@venue.com
        password:
          type: string
          format: password
          minLength: 8
          example: "SecureP@ss1"
        name:
          type: string
          minLength: 1
          example: Venue Manager
        role:
          type: string
          enum: [admin, incharge]
        venueId:
          type: string
          nullable: true
          description: Optional; for incharge only, to assign to a venue

    UserPatchRequest:
      type: object
      minProperties: 1
      properties:
        name: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [admin, incharge] }
        venueId: { type: string, nullable: true }

    VenueCreateRequest:
      type: object
      properties:
        name: { type: string }
        isActive: { type: boolean }
        metadata: { type: object }

    VenueUpdateRequest:
      type: object
      minProperties: 1
      properties:
        name: { type: string }
        isActive: { type: boolean }
        metadata: { type: object }

    SpaceCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          example: Main Hall
        description:
          type: string
          example: Large event space
        capacity:
          type: number
          nullable: true
          example: 200
        dimensions:
          type: string
          example: 40ft x 60ft
        images:
          type: array
          items: { type: string }
          description: Array of image URLs (S3 public URLs from POST /api/uploads/presign)
          example:
            - https://venuemanagementdhruva.s3.ap-south-1.amazonaws.com/uploads/images/misc/hall-1.jpg
        isActive:
          type: boolean
          default: true
        metadata:
          type: object

    SpaceUpdateRequest:
      type: object
      minProperties: 1
      properties:
        name: { type: string }
        description: { type: string }
        capacity: { type: number, nullable: true }
        dimensions: { type: string }
        images:
          type: array
          items: { type: string }
          description: Array of image URLs (replaces existing list)
        isActive: { type: boolean }
        metadata: { type: object }

    VenueProfileRequest:
      type: object
      description: Venue profile — logo, name, tagline, description, address, googleMapUrl, contact persons, social, legal
      properties:
        venueId:
          type: string
          description: Required for Admin when using PUT /api/profile/venue
        logo: { type: string }
        venueName: { type: string }
        tagline: { type: string }
        description: { type: string }
        address:
          type: object
          properties:
            line1: { type: string }
            line2: { type: string }
            city: { type: string }
            state: { type: string }
            pincode: { type: string }
            country: { type: string }
        googleMapUrl: { type: string }
        email: { type: string }
        instagram: { type: string }
        facebook: { type: string }
        website: { type: string }
        contactPersons:
          type: array
          description: Contact people for the venue (stored separately and linked to this profile)
          items:
            $ref: "#/components/schemas/ContactPersonRequest"
        legal:
          type: object
          properties:
            businessName: { type: string }
            gst: { type: string }

    ContactPersonRequest:
      type: object
      required: [name, contactNumber]
      properties:
        _id:
          type: string
          description: Optional. If provided, updates the existing contact person for this venue.
        name:
          type: string
          example: John Doe
        designation:
          type: string
          example: Manager
        contactNumber:
          type: string
          example: "+91-9876543210"
        isActive:
          type: boolean
          default: true
        metadata:
          type: object

    ContactPersonPatchRequest:
      type: object
      minProperties: 1
      properties:
        name: { type: string }
        designation: { type: string }
        contactNumber: { type: string }
        isActive: { type: boolean }
        metadata: { type: object }

    SuccessDataSchema:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          description: Response payload (object or array)

    QuoteEventWindow:
      type: object
      required: [startAt, endAt, durationHours]
      properties:
        startAt: { type: string, format: date-time }
        endAt: { type: string, format: date-time }
        durationHours: { type: number, example: 24 }

    QuoteInclusion:
      type: object
      required: [name]
      properties:
        name: { type: string, example: Generator }
        quantity: { type: number, default: 1 }
        maxQuantity: { type: number, nullable: true }

    QuoteAddon:
      type: object
      required: [name]
      properties:
        name: { type: string, example: Chairs }
        quantity: { type: number, default: 1 }
        unitPrice: { type: number, example: 100 }

    QuoteTotals:
      type: object
      properties:
        venueBase: { type: number }
        venueGst: { type: number }
        addonTotal: { type: number }
        addonGst: { type: number }
        subtotal: { type: number }
        discount: { type: number }
        total: { type: number }

    QuotePricing:
      type: object
      required: [basePrice]
      properties:
        basePrice: { type: number, example: 1000000 }
        inclusions:
          type: array
          items: { $ref: "#/components/schemas/QuoteInclusion" }
        addons:
          type: array
          items: { $ref: "#/components/schemas/QuoteAddon" }
        gstRate: { type: number, default: 0.18, example: 0.18 }
        discount: { type: number, default: 0 }
        totals:
          $ref: "#/components/schemas/QuoteTotals"

    QuoteCreateRequest:
      type: object
      required: [bookingType, eventWindow, pricing]
      description: |
        `leadId` and `venueId` come from the URL path. `createdBy` is auto-set from JWT.
        Set `draft: true` for save-as-draft, `confirmed: true` for confirm-on-create.
      properties:
        bookingType:
          type: string
          enum: [venue_buyout, space_buyout]
        spaceId:
          type: string
          description: Required when bookingType is space_buyout
        eventWindow:
          $ref: "#/components/schemas/QuoteEventWindow"
        pricing:
          $ref: "#/components/schemas/QuotePricing"
        draft:
          type: boolean
          default: true
        confirmed:
          type: boolean
          default: false

    QuoteUpdateRequest:
      type: object
      minProperties: 1
      description: Partial update. Use `confirmed: true, draft: false` to confirm a draft.
      properties:
        bookingType:
          type: string
          enum: [venue_buyout, space_buyout]
        spaceId: { type: string, nullable: true }
        eventWindow:
          $ref: "#/components/schemas/QuoteEventWindow"
        pricing:
          $ref: "#/components/schemas/QuotePricing"
        draft: { type: boolean }
        confirmed: { type: boolean }
        status:
          type: string
          enum: [draft, shared, accepted, rejected]

    LeadCreateRequest:
      type: object
      required: [eventType, specialDay, contact]
      properties:
        eventType:
          type: string
          enum: [wedding, reception, engagement, birthday, corporate, conference, exhibition, other]
          example: wedding
        eventTypeOther:
          type: string
          description: Required when eventType is "other"
          example: Baby shower
        specialDay:
          type: object
          required: [startAt, endAt, durationHours]
          properties:
            startAt: { type: string, format: date-time, example: "2026-03-20T10:30:00.000Z" }
            endAt: { type: string, format: date-time, example: "2026-03-20T22:30:00.000Z" }
            durationHours: { type: number, example: 12 }
        expectedGuests:
          type: number
          nullable: true
          example: 250
        contact:
          type: object
          required: [name, phone]
          properties:
            name: { type: string, example: Rahul Sharma }
            phone: { type: string, example: "+919876543210" }
            altPhone: { type: string, example: "+919812345678" }
        notes:
          type: string
          description: Optional notes
        metadata:
          type: object

    LeadUpdateRequest:
      type: object
      minProperties: 1
      properties:
        eventType:
          type: string
          enum: [wedding, reception, engagement, birthday, corporate, conference, exhibition, other]
        eventTypeOther: { type: string }
        specialDay:
          type: object
          properties:
            startAt: { type: string, format: date-time }
            endAt: { type: string, format: date-time }
            durationHours: { type: number }
        expectedGuests: { type: number, nullable: true }
        contact:
          type: object
          properties:
            name: { type: string }
            phone: { type: string }
            altPhone: { type: string }
        status:
          type: string
          enum: [new, contacted, followup, visited, negotiation, won, lost]
          description: "Lead pipeline status"
        notes: { type: string }
        metadata: { type: object }

    AlbumCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          example: Wedding Events
        description:
          type: string
          example: Photos from recent wedding events
        coverImage:
          type: string
          description: S3 URL for album cover image
        isActive:
          type: boolean
          default: true
        metadata:
          type: object

    AlbumUpdateRequest:
      type: object
      minProperties: 1
      properties:
        name: { type: string }
        description: { type: string }
        coverImage: { type: string }
        isActive: { type: boolean }
        metadata: { type: object }

    AddPhotosRequest:
      type: object
      required: [photos]
      properties:
        photos:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PhotoItem"

    PhotoItem:
      type: object
      required: [url]
      properties:
        url:
          type: string
          description: S3 public URL of the uploaded image
          example: https://venuemanagementdhruva.s3.ap-south-1.amazonaws.com/uploads/images/misc/photo.jpg
        key:
          type: string
          description: S3 object key (for deletion)
          example: uploads/images/misc/uuid-photo.jpg
        caption:
          type: string
          example: Main hall setup
        sortOrder:
          type: number
          description: Display order (lower = first)
          example: 1

    PhotoUpdateRequest:
      type: object
      minProperties: 1
      properties:
        url: { type: string }
        key: { type: string }
        caption: { type: string }
        sortOrder: { type: number }

    RackRates:
      type: object
      description: "Keys: duration in hours (12, 24, 36, 48). Values: price as string (empty = not offered)."
      properties:
        "12": { type: string, example: "50000" }
        "24": { type: string, example: "90000" }
        "36": { type: string, example: "120000" }
        "48": { type: string, example: "150000" }

    Inclusion:
      type: object
      required: [name]
      properties:
        _id: { type: string, description: Auto-generated MongoDB ObjectId }
        name: { type: string, example: Sound system }
        maxQuantity:
          type: number
          nullable: true
          description: Max quantity per booking (null = unlimited)
          example: 1

    Addon:
      type: object
      required: [name, prices]
      properties:
        _id: { type: string, description: Auto-generated MongoDB ObjectId }
        name: { type: string, example: Extra projector }
        maxQuantity:
          type: number
          nullable: true
          example: 2
        prices:
          $ref: "#/components/schemas/RackRates"

    SpacePricing:
      type: object
      properties:
        rackRates:
          $ref: "#/components/schemas/RackRates"
        inclusions:
          type: array
          items: { $ref: "#/components/schemas/Inclusion" }
        addons:
          type: array
          items: { $ref: "#/components/schemas/Addon" }

    VenuePricingRequest:
      type: object
      description: Full pricing upsert — venue buyout + space buyout. Send any or all fields.
      properties:
        buyoutOnly:
          type: boolean
          description: If true, hide per-space pricing; only venue buyout offered.
        rackRates:
          $ref: "#/components/schemas/RackRates"
        inclusions:
          type: array
          items: { $ref: "#/components/schemas/Inclusion" }
        addons:
          type: array
          items: { $ref: "#/components/schemas/Addon" }
        spaceOnly:
          type: boolean
          description: If true, hide venue buyout; only per-space pricing shown.
        spacePricings:
          type: object
          description: "Map of spaceId → space pricing object."
          additionalProperties:
            $ref: "#/components/schemas/SpacePricing"

    VenueBuyoutRequest:
      type: object
      description: Partial update for venue buyout fields.
      minProperties: 1
      properties:
        buyoutOnly: { type: boolean }
        rackRates:
          $ref: "#/components/schemas/RackRates"
        inclusions:
          type: array
          items: { $ref: "#/components/schemas/Inclusion" }
        addons:
          type: array
          items: { $ref: "#/components/schemas/Addon" }

    SpaceBuyoutRequest:
      type: object
      description: Partial update for space buyout fields.
      minProperties: 1
      properties:
        spaceOnly: { type: boolean }
        spacePricings:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/SpacePricing"

    PresignRequest:
      type: object
      required: [fileName, contentType]
      properties:
        fileName:
          type: string
          description: Original filename — sanitized server-side (path traversal stripped)
          example: venue-logo.jpg
        contentType:
          type: string
          description: MIME type — must be image/*
          example: image/jpeg
        entityId:
          type: string
          description: MongoDB _id of the entity (venueId, spaceId, etc.) used in the S3 key path. Defaults to "misc".
          example: "507f1f77bcf86cd799439011"
        expiresIn:
          type: integer
          description: Seconds the presigned URL is valid (1–3600). Defaults to 900 (15 min).
          default: 900
          minimum: 1
          maximum: 3600

    PresignResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            uploadUrl:
              type: string
              description: Presigned S3 PUT URL — PUT the raw file binary to this URL
              example: "https://venuemanagementdhruva.s3.ap-south-1.amazonaws.com/uploads/images/507f.../uuid-venue-logo.jpg?X-Amz-..."
            key:
              type: string
              description: S3 object key — save this in MongoDB against your entity
              example: uploads/images/507f1f77bcf86cd799439011/uuid-venue-logo.jpg
            publicUrl:
              type: string
              description: Public HTTPS URL to read the file after upload
              example: "https://venuemanagementdhruva.s3.ap-south-1.amazonaws.com/uploads/images/507f.../uuid-venue-logo.jpg"
            expiresIn:
              type: integer
              description: Seconds the presigned URL is valid for
              example: 900

    DeleteUploadRequest:
      type: object
      required: [key]
      properties:
        key:
          type: string
          description: S3 object key returned from POST /api/uploads/presign. Must start with uploads/.
          example: uploads/images/507f1f77bcf86cd799439011/uuid-venue-logo.jpg

    HealthResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            message: { type: string }
            stage: { type: string }
            timestamp: { type: string, format: date-time }

    # -------- Calendar schemas --------
    CalendarDay:
      type: object
      properties:
        _id: { type: string }
        religion:
          type: string
          enum: [hindu, muslim, christian]
        type:
          type: string
          enum: [most_auspicious, auspicious, less_auspicious]
        date:
          type: string
          description: "YYYY-MM-DD"
          example: "2026-01-09"
        createdBy: { type: string }
        createdByUser:
          type: object
          description: Populated user who created the entry
          properties:
            _id: { type: string }
            name: { type: string }
            email: { type: string }
            role: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CalendarDayCreateRequest:
      type: object
      required: [religion, type, date]
      properties:
        religion:
          type: string
          enum: [hindu, muslim, christian]
        type:
          type: string
          enum: [most_auspicious, auspicious, less_auspicious]
        date:
          type: string
          description: "YYYY-MM-DD"
          example: "2026-01-09"

    CalendarDayBulkRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          maxItems: 500
          items:
            $ref: "#/components/schemas/CalendarDayCreateRequest"

    CalendarDayUpdateRequest:
      type: object
      properties:
        religion:
          type: string
          enum: [hindu, muslim, christian]
        type:
          type: string
          enum: [most_auspicious, auspicious, less_auspicious]
        date:
          type: string
          description: "YYYY-MM-DD"

    # -------- Payment schemas --------
    PaymentReminder:
      type: object
      properties:
        _id: { type: string }
        venueId: { type: string }
        leadId: { type: string }
        expectedAmount:
          type: number
          minimum: 0
        expectedDate:
          type: string
          format: date-time
          description: Expected payment date (normalized to midnight)

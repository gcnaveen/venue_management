# Venue Management API - Swagger spec
# Hosted docs URL (after deploy): https://<your-api-id>.execute-api.<region>.amazonaws.com/api/docs

openapi: "3.1.0"

info:
  title: Venue Management API
  version: 1.0.0
  description: |
    Production-grade Serverless API (AWS Lambda + API Gateway HTTP API)
    for Venue Management. Roles: **Admin** (full access) and **Incharge** (manages assigned venue).

    **Authentication**
    - **Incharge**: Register with email + password via `POST /api/auth/register`. Optionally link to a venue with `venueId`.
    - **Admin**: Created via script or DB; login with email + password.
    - **Login**: `POST /api/auth/login` with email + password. Returns JWT.
    - Protected endpoints use `Authorization: Bearer <token>`.
  contact:
    name: API Support
    email: support@example.com
  license:
    name: Proprietary
    url: https://example.com/license
  termsOfService: https://example.com/terms

servers:
  - url: http://localhost:3000
    description: Local (serverless-offline)
  - url: https://{apiId}.execute-api.{region}.amazonaws.com
    description: Production (API Gateway HTTP API)
    variables:
      apiId:
        default: your-api-id
      region:
        default: ap-south-1
      api-gateway-url:
        default: https://your-api-id.execute-api.ap-south-1.amazonaws.com/

tags:
  - name: Authentication
    description: Registration, login, and user management (Admin, Incharge)
  - name: Venues
    description: Venue CRUD
  - name: Spaces
    description: Spaces per venue (one venue, multiple spaces)
  - name: Profile
    description: Venue profile (logo, tagline, address, social, legal) — Incharge role
  - name: Pricing
    description: Venue buyout and per-space pricing (rack rates, inclusions, addons) per venue
  - name: Leads
    description: Event enquiries / leads per venue (created by Incharge or Admin)
  - name: Quotes
    description: Pricing quotes for leads (draft → confirmed, venue buyout or space buyout)
  - name: Payments
    description: Payment reminders and received payments per lead (venue-scoped)
  - name: Commissions
    description: Commission inflows and outflows per lead (venue-scoped)
  - name: Vendors
    description: External vendors/partners per venue
  - name: Gallery
    description: Albums with photos per venue
  - name: Uploads
    description: S3 presigned URL generation and file deletion (bucket — venuemanagementdhruva)
  - name: Calendar
    description: Religious calendar – global auspicious days (admin-managed, shared across all venues)
  - name: Health
    description: Health check

security:
  - bearerAuth: []

paths:
  # -------- Auth --------
  /api/auth/register:
    post:
      tags: [Authentication]
      summary: Register Incharge
      description: |
        Create an Incharge account. Email, password, and name required.
        Optional `venueId` to assign the incharge to a venue.
        Returns user and JWT.
      operationId: registerIncharge
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              email: incharge@venue.com
              password: "SecureP@ss1"
              name: Venue Manager
              venueId: "507f1f77bcf86cd799439011"
      responses:
        "201":
          description: Incharge registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/auth/login:
    post:
      tags: [Authentication]
      summary: Login
      description: Login with email + password. Returns user and JWT. Admin and Incharge.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/auth/me:
    get:
      tags: [Authentication]
      summary: Get current user
      description: Returns the authenticated user (from JWT).
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # -------- Users (Admin only) --------
  /api/users:
    post:
      tags: [Authentication]
      summary: Create user (Admin)
      description: |
        Admin creates a user who has not registered. Provide email, password, name and role (admin or incharge).
        For incharge, optionally set venueId to assign to a venue. Email must be unique; returns 409 if already registered.
      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
            example:
              email: incharge@venue.com
              password: "SecureP@ss1"
              name: Venue Manager
              role: incharge
              venueId: "507f1f77bcf86cd799439011"
      responses:
        "201":
          description: User created (no token; user can login with email/password)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      tags: [Authentication]
      summary: List users
      description: Admin only. List all users. Response includes populated `venue` object for each user.
      operationId: listUsers
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/users/{userId}:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      tags: [Authentication]
      summary: Get user by ID
      operationId: getUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Authentication]
      summary: Update user
      description: Admin only. Partial update (name, email, role, venueId).
      operationId: updateUser
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPatchRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Authentication]
      summary: Delete user
      description: Admin only.
      operationId: deleteUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/users/{userId}/block:
    parameters:
      - $ref: "#/components/parameters/UserId"
    post:
      tags: [Authentication]
      summary: Block user
      description: Admin only. Sets user as blocked.
      operationId: blockUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/users/{userId}/unblock:
    parameters:
      - $ref: "#/components/parameters/UserId"
    post:
      tags: [Authentication]
      summary: Unblock user
      description: Admin only.
      operationId: unblockUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User unblocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # -------- Venues --------
  /api/venues:
    post:
      tags: [Venues]
      summary: Create venue
      description: Admin only. Creates a venue with name, isActive and metadata. Contact/address/social are managed in the venue profile by incharge.
      operationId: createVenue
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VenueCreateRequest"
      responses:
        "201":
          description: Venue created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    get:
      tags: [Venues]
      summary: List venues
      description: Admin sees all; Incharge sees only their assigned venue.
      operationId: listVenues
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of venues
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/venues/{venueId}:
    parameters:
      - $ref: "#/components/parameters/VenueId"
    get:
      tags: [Venues]
      summary: Get venue by ID
      operationId: getVenue
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Venue details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Venues]
      summary: Update venue
      description: Admin only. Updates venue fields (name, isActive, metadata). Contact/address/social are managed in the venue profile.
      operationId: updateVenue
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VenueUpdateRequest"
      responses:
        "200":
          description: Venue updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Venues]
      summary: Delete venue
      description: Admin only.
      operationId: deleteVenue
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Venue deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # -------- Spaces (multiple spaces per venue) --------
  /api/venues/{venueId}/spaces:
    parameters:
      - $ref: "#/components/parameters/VenueId"
    post:
      tags: [Spaces]
      summary: Add space to venue
      description: |
        Create a space for a venue. One venue can have multiple spaces.
        Admin can add spaces to any venue; Incharge only to their assigned venue.
      operationId: createSpace
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpaceCreateRequest"
            example:
              name: Main Hall
              description: Large event space
              capacity: 200
              dimensions: 40ft x 60ft
              images:
                - https://venuemanagementdhruva.s3.ap-south-1.amazonaws.com/uploads/images/misc/hall-1.jpg
                - https://venuemanagementdhruva.s3.ap-south-1.amazonaws.com/uploads/images/misc/hall-2.jpg
              isActive: true
      responses:
        "201":
          description: Space created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    get:
      tags: [Spaces]
      summary: List spaces for venue
      description: Returns all spaces for the given venue. Admin: any venue; Incharge: only their venue.
      operationId: listSpaces
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of spaces
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/venues/{venueId}/spaces/{spaceId}:
    parameters:
      - $ref: "#/components/parameters/VenueId"
      - $ref: "#/components/parameters/SpaceId"
    get:
      tags: [Spaces]
      summary: Get space by ID
      operationId: getSpace
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Space details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Spaces]
      summary: Update space
      operationId: updateSpace
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpaceUpdateRequest"
      responses:
        "200":
          description: Space updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Spaces]
      summary: Delete space
      operationId: deleteSpace
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Space deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # -------- Contact Persons (separate CRUD) --------
  /api/venues/{venueId}/contact-persons:
    parameters:
      - $ref: "#/components/parameters/VenueId"
    post:
      tags: [Profile]
      summary: Add contact person to venue
      description: Creates a contact person for a venue and links it to the venue profile.
      operationId: createContactPerson
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactPersonRequest"
      responses:
        "201":
          description: Contact person created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    get:
      tags: [Profile]
      summary: List contact persons for venue
      operationId: listContactPersons
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of contact persons
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/venues/{venueId}/contact-persons/{contactPersonId}:
    parameters:
      - $ref: "#/components/parameters/VenueId"
    get:
      tags: [Profile]
      summary: Get contact person
      operationId: getContactPerson
      security:
        - bearerAuth: []
      parameters:
        - name: contactPersonId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Contact person
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Profile]
      summary: Update contact person
      operationId: updateContactPerson
      security:
        - bearerAuth: []
      parameters:
        - name: contactPersonId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactPersonPatchRequest"
      responses:
        "200":
          description: Contact person updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Profile]
      summary: Delete contact person
      operationId: removeContactPerson
      security:
        - bearerAuth: []
      parameters:
        - name: contactPersonId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Contact person deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # -------- Profile (Venue profile — Incharge) --------
  /api/profile/venue:
    get:
      tags: [Profile]
      summary: Get current venue profile
      description: |
        Incharge: returns their assigned venue's profile.
        Admin: pass `venueId` in query to get that venue's profile.
      operationId: getProfileVenue
      security:
        - bearerAuth: []
      parameters:
        - name: venueId
          in: query
          description: Required for Admin when not incharge
          schema:
            type: string
      responses:
        "200":
          description: Venue profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Profile]
      summary: Create or update venue profile
      description: |
        Upsert venue profile. Incharge: updates their venue only. Admin: pass `venueId` in body.
        Fields: logo, venueName, tagline, description, address, googleMapUrl, email, instagram, facebook, website, legal (businessName, gst).
      operationId: putProfileVenue
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VenueProfileRequest"
      responses:
        "200":
          description: Venue profile saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/profile/venue/contact-persons/{contactPersonId}:
    delete:
      tags: [Profile]
      summary: Delete contact person (current venue)
      description: |
        Deletes a contact person linked to the current venue profile.
        Incharge: deletes within their own venue.
        Admin: provide `venueId` as query param to target a venue.
      operationId: deleteContactPersonForCurrentVenue
      security:
        - bearerAuth: []
      parameters:
        - name: contactPersonId
          in: path
          required: true
          schema: { type: string }
        - name: venueId
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/venues/{venueId}/profile:
    parameters:
      - $ref: "#/components/parameters/VenueId"
    get:
      tags: [Profile]
      summary: Get venue profile by venue ID
      operationId: getVenueProfile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Venue profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Profile]
      summary: Create or update venue profile by venue ID
      description: Incharge can only update their assigned venue.
      operationId: putVenueProfile
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VenueProfileRequest"
      responses:
        "200":
          description: Venue profile saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/venues/{venueId}/profile/contact-persons/{contactPersonId}:
    parameters:
      - $ref: "#/components/parameters/VenueId"
    delete:
      tags: [Profile]
      summary: Delete contact person (by venue)
      description: Incharge can only delete within their assigned venue. Admin can delete for any venue.
      operationId: deleteContactPerson
      security:
        - bearerAuth: []
      parameters:
        - name: contactPersonId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # -------- Pricing --------
  /api/venues/{venueId}/pricing:
    parameters:
      - $ref: "#/components/parameters/VenueId"
    get:
      tags: [Pricing]
      summary: Get venue pricing
      description: |
        Returns the full pricing document (venue buyout + space buyout) for the venue.
        Response includes a `spaces` array with all spaces for the venue (for UI mapping).
        If no pricing exists yet, returns a default empty structure.
      operationId: getPricing
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Pricing document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    put:
      tags: [Pricing]
      summary: Upsert venue pricing
      description: |
        Create or fully update pricing for a venue. Accepts venue buyout fields, space buyout fields, or both.
        All values are sanitized server-side.
      operationId: putPricing
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VenuePricingRequest"
            example:
              buyoutOnly: false
              rackRates:
                "12": "50000"
                "24": "90000"
                "36": "120000"
                "48": "150000"
              inclusions:
                - name: Sound system
                  maxQuantity: 1
                - name: Basic lighting
              addons:
                - name: Extra projector
                  maxQuantity: 2
                  prices:
                    "12": "5000"
                    "24": "8000"
                    "36": "10000"
                    "48": "12000"
              spaceOnly: false
              spacePricings:
                69afc2df3235f0510b471102:
                  rackRates:
                    "12": "30000"
                    "24": "55000"
                    "36": "75000"
                    "48": "95000"
                  inclusions:
                    - name: WiFi
                  addons: []
      responses:
        "200":
          description: Pricing upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:

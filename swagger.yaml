        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema: { type: string, enum: [draft, shared, accepted, rejected] }
        - name: draft
          in: query
          required: false
          schema: { type: string, enum: ["true", "false"] }
        - name: confirmed
          in: query
          required: false
          schema: { type: string, enum: ["true"] }
      responses:
        "200":
          description: List of quotes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"

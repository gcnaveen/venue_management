    post:
      tags: [Quotes]
      summary: Create quote for a lead
      description: |
        Create a pricing quote for a lead. Set `draft: true` for save-as-draft, or `confirmed: true` to confirm immediately.

        **Invariant:** `draft=true` forces `confirmed=false` and vice versa. Status is auto-derived.
      operationId: postQuote
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteCreateRequest"
            examples:
              venueBuyoutDraft:
                summary: Venue buyout (draft)
                value:
                  bookingType: venue_buyout
                  eventWindow:
                    startAt: "2026-03-11T07:31:00.000Z"
                    endAt: "2026-03-12T07:31:00.000Z"
                    durationHours: 24
                  pricing:
                    basePrice: 1000000
                    inclusions:
                      - name: Generator
                        quantity: 1
                        maxQuantity: 1
                      - name: House keeping
                        quantity: 15
                        maxQuantity: 15
                    addons:
                      - name: Chairs
                        quantity: 10
                        unitPrice: 100
                      - name: Suite Rooms
                        quantity: 2
                        unitPrice: 4000
                    gstRate: 0.18
                    discount: 0
                    totals:
                      venueBase: 1000000
                      venueGst: 180000
                      addonTotal: 9000
                      addonGst: 1620
                      subtotal: 1190620
                      discount: 0
                      total: 1190620
                  draft: true
                  confirmed: false
              spaceBuyoutDraft:
                summary: Space buyout (draft)
                value:
                  bookingType: space_buyout
                  spaceId: "SPACE_OBJECT_ID"
                  eventWindow:
                    startAt: "2026-03-11T07:31:00.000Z"
                    endAt: "2026-03-11T19:31:00.000Z"
                    durationHours: 12
                  pricing:
                    basePrice: 300000
                    inclusions:
                      - name: WiFi
                        quantity: 1
                    addons:
                      - name: Extra projector
                        quantity: 1
                        unitPrice: 5000
                    gstRate: 0.18
                    discount: 10000
                    totals:
                      venueBase: 300000
                      venueGst: 54000
                      addonTotal: 5000
                      addonGst: 900
                      subtotal: 359900
                      discount: 10000
                      total: 349900
                  draft: true
                  confirmed: false
      responses:
        "201":
          description: Quote created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessDataSchema"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
